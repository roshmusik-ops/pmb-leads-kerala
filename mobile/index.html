<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<meta name="theme-color" content="#16a34a" />
<title>PMB Leads — Kerala Govt Health</title>
<link rel="manifest" href="manifest.webmanifest" />
<link rel="apple-touch-icon" href="icon-192.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  theme: { extend: {
    colors: { brand: { 50:'#e0f2fe',100:'#bae6fd',500:'#0ea5e9',600:'#0284c7',700:'#0369a1',800:'#075985'} },
    fontFamily: { sans: ['system-ui','-apple-system','Segoe UI','Roboto','sans-serif'] },
  }}
};
</script>
<style>
  html,body{ overscroll-behavior-y:contain; }
  body{ padding-top:env(safe-area-inset-top); padding-bottom:env(safe-area-inset-bottom); }
  .chip{ @apply inline-flex items-center gap-1 px-3 py-1.5 rounded-full text-sm font-medium border transition; }
  .chip-on{ @apply bg-brand-600 text-white border-brand-600; }
  .chip-off{ @apply bg-white text-slate-700 border-slate-300; }
  .card{ @apply bg-white rounded-2xl shadow-sm border border-sky-100 p-4; }
  /* hide scrollbars on chip rows */
  .no-scrollbar::-webkit-scrollbar{ display:none; }
  .no-scrollbar{ -ms-overflow-style:none; scrollbar-width:none; }
  details>summary{ list-style:none; cursor:pointer; }
  details>summary::-webkit-details-marker{ display:none; }
</style>
</head>
<body class="bg-sky-50 text-slate-900 min-h-screen">

<!-- Top bar -->
<header class="sticky top-0 z-30 bg-gradient-to-r from-sky-600 to-sky-400 text-white shadow-md">
  <div class="px-4 pt-3 pb-2 flex items-center gap-3">
    <div class="w-9 h-9 rounded-xl bg-white/15 grid place-items-center text-lg">🏥</div>
    <div class="flex-1 min-w-0">
      <div class="font-semibold leading-tight truncate">Kerala Health Leads</div>
      <div class="text-[11px] text-white/80 leading-tight">PMB Jan Aushadhi Chelakottukara · Thrissur</div>
    </div>
    <button id="installBtn" class="hidden text-xs bg-white/15 hover:bg-white/25 px-2.5 py-1.5 rounded-lg">Install</button>
    <button id="refreshBtn" title="Refresh" class="text-lg leading-none w-9 h-9 rounded-lg bg-white/10 hover:bg-white/20">↻</button>
  </div>
  <!-- Search -->
  <div class="px-4 pb-3">
    <div class="relative">
      <input id="search" type="search" inputmode="search" placeholder="Search name, address, operator…"
             class="w-full bg-white text-slate-900 placeholder:text-slate-400 rounded-xl pl-10 pr-3 py-2.5 text-sm shadow-sm focus:outline-none focus:ring-2 focus:ring-white/60" />
      <svg class="absolute left-3 top-2.5 w-5 h-5 text-slate-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
    </div>
  </div>
  <!-- District chips -->
  <div id="districtRow" class="flex gap-2 overflow-x-auto no-scrollbar px-4 pb-2"></div>
  <!-- Type preset chips -->
  <div class="flex gap-2 overflow-x-auto no-scrollbar px-4 pb-3" id="presetRow">
    <button class="chip chip-on" data-preset="hi">High-value</button>
    <button class="chip chip-off" data-preset="phc">PHC/FHC/CHC</button>
    <button class="chip chip-off" data-preset="hosp">Hospitals</button>
    <button class="chip chip-off" data-preset="all">All</button>
    <button class="chip chip-off" data-preset="phone">Has phone ☎</button>
  </div>
</header>

<!-- Stats -->
<div class="px-4 pt-3">
  <div id="stats" class="text-xs text-slate-500"></div>
</div>

<!-- List -->
<main id="list" class="px-4 pt-2 pb-28 space-y-2"></main>

<!-- "load more" trigger -->
<div id="sentinel" class="h-10"></div>

<!-- Detail modal -->
<div id="modal" class="hidden fixed inset-0 z-50 bg-black/50 flex items-end sm:items-center justify-center p-2 sm:p-6">
  <div class="bg-white rounded-t-3xl sm:rounded-3xl w-full sm:max-w-md max-h-[88vh] overflow-y-auto shadow-2xl">
    <div class="sticky top-0 bg-white px-5 pt-4 pb-2 flex items-start gap-3 border-b border-slate-100">
      <div class="flex-1 min-w-0">
        <div id="mName" class="font-semibold text-lg leading-tight"></div>
        <div id="mMeta" class="text-xs text-slate-500 mt-0.5"></div>
      </div>
      <button onclick="closeModal()" class="text-slate-400 hover:text-slate-700 text-2xl leading-none">×</button>
    </div>
    <div class="p-5 space-y-3" id="mBody"></div>
  </div>
</div>

<!-- Bottom hint -->
<div class="fixed bottom-3 inset-x-0 px-4 pointer-events-none">
  <div id="toast" class="hidden mx-auto max-w-sm bg-slate-900 text-white text-sm px-4 py-2 rounded-xl shadow-lg pointer-events-auto"></div>
</div>

<script src="app.js"></script>
<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}
</script>
</body>
</html>
